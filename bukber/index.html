<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Buka Bersama</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    height:100%;
}

body{
    background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
    color:white;
    overflow-x:hidden;
    scroll-behavior:smooth;
}

/* Canvas full */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Section */
.section{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px 20px;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(24px,5vw,36px);
    color:#FFD369;
    margin-bottom:20px;
}

h2{
    font-size:clamp(18px,4vw,24px);
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    max-width:600px;
    width:100%;
    box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#FFD369;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:white;
}

.hidden{
    display:none;
}

/* Countdown */
.countdown{
    display:flex;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.count-box{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    min-width:70px;
}

.count-box h2{
    font-size:clamp(20px,4vw,28px);
}

/* Ornamen */
.mosque{
    font-size:clamp(40px,8vw,60px);
    margin-bottom:20px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px #FFD369; }
    to{ text-shadow:0 0 25px #FFD369; }
}

a{
    text-decoration:none;
}

/* Mobile */
@media(max-width:480px){
    .card{
        padding:25px 20px;
    }

    button{
        width:100%;
    }

    .count-box{
        flex:1 1 40%;
    }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- COVER -->
<section class="section" id="cover">
    <div class="card">
        <div class="mosque">🕌</div>
        <h1>Undangan Buka Bersama</h1>
        <p>Kepada Yth:</p>
        <h2 id="guestName"></h2>
        <button onclick="openInvite()">Buka Undangan</button>
    </div>
</section>

<!-- CONTENT -->
<section class="section hidden" id="content">
    <div class="card">
        <h1>✨ Buka Bersama Ramadan 2026 ✨</h1>
        <p>Dengan penuh kebahagiaan, kami mengundang Anda untuk hadir pada:</p>

        <p><strong>Hari:</strong> Jumat</p>
        <p><strong>Tanggal:</strong> 6 Maret 2026</p>
        <p><strong>Waktu:</strong> 17.00 WIB</p>
        <p><strong>Tempat:</strong> Millenials Space Cafe & Resto</p>

        <div class="countdown">
            <div class="count-box"><h2 id="days">0</h2><small>Hari</small></div>
            <div class="count-box"><h2 id="hours">0</h2><small>Jam</small></div>
            <div class="count-box"><h2 id="minutes">0</h2><small>Menit</small></div>
            <div class="count-box"><h2 id="seconds">0</h2><small>Detik</small></div>
        </div>

        <a href="https://heyzine.com/flip-book/d0744f0ef3.html?utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAb21jcAQGJrBleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA81NjcwNjczNDMzNTI0MjcAAac5e4YN8k2JaM9UIXL4gsUtMgfofgvYBc8Xn0Z9x3oF9Sj8fs0K32DtnwzjUA_aem_vhm96_N3BCdvyB1wShWnsw#page/8" target="_blank">
            <button>🍗 Lihat Menu</button>
        </a>

        <a href="https://maps.app.goo.gl/XC6EgYGDQkUx3WL18" target="_blank">
            <button>📍 Lihat Lokasi</button>
        </a>

        <button onclick="shareWhatsApp()">📤 Share WhatsApp</button>

        <p style="margin-top:20px;">Kami tunggu kehadiran Anda 🙏</p>
    </div>
</section>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Nama dari URL
const urlParams = new URLSearchParams(window.location.search);
const guest = urlParams.get('to');
document.getElementById("guestName").innerText = guest ? guest : "Tamu Undangan";

// Buka Undangan
function openInvite(){
    document.getElementById("cover").classList.add("hidden");
    document.getElementById("content").classList.remove("hidden");
    document.getElementById("music").play();
}

// Countdown
const eventDate = new Date("March 6, 2026 17:00:00").getTime();

setInterval(function(){
    const now = new Date().getTime();
    const distance = eventDate - now;

    if(distance < 0) return;

    document.getElementById("days").innerText = Math.floor(distance/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerText = Math.floor((distance%(1000*60*60))/(1000*60));
    document.getElementById("seconds").innerText = Math.floor((distance%(1000*60))/1000);
},1000);

// Share WA
function shareWhatsApp(){
    const nama = guest ? guest : "Tamu Undangan";
    const url = window.location.href;
    const text = `Assalamu’alaikum ${nama}, Anda diundang ke acara Buka Bersama 🌙\n${url}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`,'_blank');
}

/* ================= PARTICLE FULL SCREEN ================= */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particlesArray = [];

class Particle{
    constructor(){
        this.reset();
        this.size = Math.random()*3+1;
        this.speedY = Math.random()*1+0.5;
    }

    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
    }

    update(){
        this.y += this.speedY;
        if(this.y > canvas.height){
            this.y = 0;
            this.x = Math.random()*canvas.width;
        }
    }

    draw(){
        ctx.fillStyle = "#FFD369";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function initParticles(){
    particlesArray = [];
    for(let i=0;i<120;i++){
        particlesArray.push(new Particle());
    }
}
initParticles();

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
